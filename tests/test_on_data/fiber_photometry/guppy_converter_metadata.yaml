# Editable metadata for the TDT + GuPPy converter on-data test, in the single-series
# metadata_key format (top-level DeviceModels / Devices / FiberPhotometry). It fills the
# converter scaffold's placeholder sentinels with real values so the conversion is clean.
# The FiberPhotometryTable row keys (dms_signal / dms_control / dls_signal / dls_control)
# match the per-store rows the converter builds from the GuPPy storesList.
DeviceModels:
  optical_fiber_model:
    manufacturer: Doric Lenses
    numerical_aperture: 0.48
  excitation_source_model:
    manufacturer: Doric Lenses
    source_type: LED
    excitation_mode: one-photon
  photodetector_model:
    manufacturer: Doric Lenses
    detector_type: photodiode

FiberPhotometry:
  FiberPhotometryIndicators:
    indicator:
      label: GCaMP7b
      description: GCaMP7b calcium indicator expressed in SNc dopamine terminals.
  FiberPhotometryTable:
    description: Acquisition fiber-photometry table for the TDT + GuPPy dual-region session.
    rows:
      dms_signal:
        location: DMS
        excitation_wavelength_in_nm: 465.0
        emission_wavelength_in_nm: 525.0
      dms_control:
        location: DMS
        excitation_wavelength_in_nm: 405.0
        emission_wavelength_in_nm: 525.0
      dls_signal:
        location: DLS
        excitation_wavelength_in_nm: 465.0
        emission_wavelength_in_nm: 525.0
      dls_control:
        location: DLS
        excitation_wavelength_in_nm: 405.0
        emission_wavelength_in_nm: 525.0
  dms_signal:
    description: Calcium-dependent (465 nm) fluorescence from DMS dopamine terminals.
  dms_control:
    description: Isosbestic (405 nm) control fluorescence from DMS dopamine terminals.
  dls_signal:
    description: Calcium-dependent (465 nm) fluorescence from DLS dopamine terminals.
  dls_control:
    description: Isosbestic (405 nm) control fluorescence from DLS dopamine terminals.
