NWBFile:
  # NPM recordings carry no embedded recording-start timestamp, so it must be supplied here.
  session_start_time: "2024-02-12T12:01:36-07:00"

Ophys:
  FiberPhotometry:
    OpticalFiberModels:
      - name: optical_fiber_model
        description: Fiber optic implant model specifications.
        manufacturer: Neurophotometrics
        model_number: Fiber Optic Implant
        numerical_aperture: 0.48
        core_diameter_in_um: 400.0

    OpticalFibers:
      - name: optical_fiber_region0
        description: Fiber optic implant placed above target region 0.
        model: optical_fiber_model
        serial_number: "OF000"
        fiber_insertion:
          depth_in_mm: 2.8
          insertion_position_ap_in_mm: 0.8
          insertion_position_ml_in_mm: 1.5
          insertion_position_dv_in_mm: 2.8
          position_reference: bregma
          hemisphere: right
      - name: optical_fiber_region1
        description: Fiber optic implant placed above target region 1.
        model: optical_fiber_model
        serial_number: "OF001"
        fiber_insertion:
          depth_in_mm: 2.8
          insertion_position_ap_in_mm: 0.8
          insertion_position_ml_in_mm: 1.6
          insertion_position_dv_in_mm: 2.8
          position_reference: bregma
          hemisphere: right
      - name: optical_fiber_region2
        description: Fiber optic implant placed above target region 2.
        model: optical_fiber_model
        serial_number: "OF002"
        fiber_insertion:
          depth_in_mm: 2.8
          insertion_position_ap_in_mm: 0.8
          insertion_position_ml_in_mm: 1.7
          insertion_position_dv_in_mm: 2.8
          position_reference: bregma
          hemisphere: right

    ExcitationSourceModels:
      - name: excitation_source_model
        description: Connectorized LED model specifications.
        manufacturer: Neurophotometrics
        model_number: Connectorized LED
        source_type: LED
        excitation_mode: one-photon
        wavelength_range_in_nm: [400.0, 470.0]

    ExcitationSources:
      - name: excitation_source_calcium_signal
        description: 470nm LED for the calcium-dependent signal channel.
        model: excitation_source_model
        power_in_W: 0.001
      - name: excitation_source_isosbestic_control
        description: 415nm LED for the isosbestic control channel.
        model: excitation_source_model
        power_in_W: 0.001

    PhotodetectorModels:
      - name: photodetector_model
        description: CMOS camera sensor specifications.
        manufacturer: Neurophotometrics
        model_number: FP3002 CMOS Sensor
        detector_type: photodiode
        wavelength_range_in_nm: [400.0, 700.0]
        gain: 1.0e+10
        gain_unit: V/W

    Photodetectors:
      - name: photodetector
        description: CMOS sensor recording the emitted fluorescence.
        model: photodetector_model
        serial_number: "PD001"

    FiberPhotometryIndicators:
      - name: green_fluorophore
        description: GCaMP7b indicator for fiber photometry experiments.
        manufacturer: Addgene
        label: GCaMP7b

    FiberPhotometryTable:
      name: fiber_photometry_table
      description: Fiber photometry system metadata table for the legacy Neurophotometrics recording.
      rows:
        - name: "0"
          location: region0
          excitation_wavelength_in_nm: 470.0
          emission_wavelength_in_nm: 525.0
          indicator: green_fluorophore
          optical_fiber: optical_fiber_region0
          excitation_source: excitation_source_calcium_signal
          photodetector: photodetector
        - name: "1"
          location: region0
          excitation_wavelength_in_nm: 415.0
          emission_wavelength_in_nm: 525.0
          indicator: green_fluorophore
          optical_fiber: optical_fiber_region0
          excitation_source: excitation_source_isosbestic_control
          photodetector: photodetector
        - name: "2"
          location: region1
          excitation_wavelength_in_nm: 470.0
          emission_wavelength_in_nm: 525.0
          indicator: green_fluorophore
          optical_fiber: optical_fiber_region1
          excitation_source: excitation_source_calcium_signal
          photodetector: photodetector
        - name: "3"
          location: region1
          excitation_wavelength_in_nm: 415.0
          emission_wavelength_in_nm: 525.0
          indicator: green_fluorophore
          optical_fiber: optical_fiber_region1
          excitation_source: excitation_source_isosbestic_control
          photodetector: photodetector
        - name: "4"
          location: region2
          excitation_wavelength_in_nm: 470.0
          emission_wavelength_in_nm: 525.0
          indicator: green_fluorophore
          optical_fiber: optical_fiber_region2
          excitation_source: excitation_source_calcium_signal
          photodetector: photodetector
        - name: "5"
          location: region2
          excitation_wavelength_in_nm: 415.0
          emission_wavelength_in_nm: 525.0
          indicator: green_fluorophore
          optical_fiber: optical_fiber_region2
          excitation_source: excitation_source_isosbestic_control
          photodetector: photodetector

    FiberPhotometryResponseSeries:
      - name: calcium_signal_region0
        description: The fluorescence from the calcium-dependent signal channel for region 0 (row-cycling channel 2, data column 1).
        stream_name: file0_chod1
        unit: a.u.
        fiber_photometry_table_region: [0]
        fiber_photometry_table_region_description: The region of the FiberPhotometryTable corresponding to the region 0 calcium signal.
      - name: isosbestic_control_region0
        description: The fluorescence from the isosbestic control channel for region 0 (row-cycling channel 1, data column 1).
        stream_name: file0_chev1
        unit: a.u.
        fiber_photometry_table_region: [1]
        fiber_photometry_table_region_description: The region of the FiberPhotometryTable corresponding to the region 0 isosbestic control.
      - name: calcium_signal_region1
        description: The fluorescence from the calcium-dependent signal channel for region 1 (row-cycling channel 2, data column 2).
        stream_name: file0_chod2
        unit: a.u.
        fiber_photometry_table_region: [2]
        fiber_photometry_table_region_description: The region of the FiberPhotometryTable corresponding to the region 1 calcium signal.
      - name: isosbestic_control_region1
        description: The fluorescence from the isosbestic control channel for region 1 (row-cycling channel 1, data column 2).
        stream_name: file0_chev2
        unit: a.u.
        fiber_photometry_table_region: [3]
        fiber_photometry_table_region_description: The region of the FiberPhotometryTable corresponding to the region 1 isosbestic control.
      - name: calcium_signal_region2
        description: The fluorescence from the calcium-dependent signal channel for region 2 (row-cycling channel 2, data column 3).
        stream_name: file0_chod3
        unit: a.u.
        fiber_photometry_table_region: [4]
        fiber_photometry_table_region_description: The region of the FiberPhotometryTable corresponding to the region 2 calcium signal.
      - name: isosbestic_control_region2
        description: The fluorescence from the isosbestic control channel for region 2 (row-cycling channel 1, data column 3).
        stream_name: file0_chev3
        unit: a.u.
        fiber_photometry_table_region: [5]
        fiber_photometry_table_region_description: The region of the FiberPhotometryTable corresponding to the region 2 isosbestic control.
