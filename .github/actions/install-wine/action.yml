name: Install packages
description: This action installs the package and its dependencies for testing

inputs:
  os:
    description: 'Operating system to set up'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install wine on Linux
      if: runner.os == 'Linux'
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo dpkg --add-architecture i386
        sudo apt-get update -qq
        sudo apt-get install -yqq --allow-downgrades libc6:i386 libgcc-s1:i386 libstdc++6:i386 wine
      shell: bash

    - name: Install wine on macOS
      if: runner.os == 'macOS'
      run: |
        # Check if running on Apple Silicon
        if [[ $(uname -m) == 'arm64' ]]; then
          echo "Running on Apple Silicon, installing Rosetta 2"
          softwareupdate --install-rosetta --agree-to-license
        else
          echo "Running on Intel Mac, skipping Rosetta 2 installation"
        fi

        # Install XQuartz
        brew install --cask xquartz

        # Install wine-crossover from a pinned Gcenx tap commit.
        # Gcenx deleted the wine-crossover cask from their tap on 2026-04-16
        # (the tap now only ships game-porting-toolkit), so we fetch the last
        # working cask definition directly. The underlying tarball is still
        # hosted at github.com/Gcenx/winecx/releases. If that tarball ever
        # disappears or Rosetta 2 is removed from macOS, we will likely need
        # to drop Plexon2 testing on macOS and keep it on Linux only.
        brew install --cask https://raw.githubusercontent.com/Gcenx/homebrew-wine/3df0f2291f39b0f43c532d754df4756495544f34/Casks/wine-crossover.rb
      shell: bash

    - name: Skip installation on Windows
      if: ${{ inputs.os == 'Windows' }}
      run: echo "Skipping Wine installation on Windows. Not necessary."
      shell: bash
