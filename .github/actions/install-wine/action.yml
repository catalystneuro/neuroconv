name: Install packages
description: This action installs the package and its dependencies for testing

inputs:
  os:
    description: 'Operating system to set up'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install wine on Linux
      if: runner.os == 'Linux'
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo dpkg --add-architecture i386
        sudo apt-get update -qq
        sudo apt-get install -yqq --allow-downgrades libc6:i386 libgcc-s1:i386 libstdc++6:i386 wine
      shell: bash

    - name: Skip Wine install on macOS
      if: runner.os == 'macOS'
      run: |
        # Plexon2 tests require Wine on macOS via zugbruecke. The
        # wine-crossover Homebrew cask (the only tap that worked reliably
        # on Apple Silicon) was removed by Gcenx on 2026-04-16. Rather
        # than maintain a pinned-cask workaround against a shrinking
        # upstream, Plexon2 tests are skipped on macOS at the test layer.
        # Linux keeps full Plexon2 coverage via apt-installed wine.
        echo "Skipping Wine install on macOS; Plexon2 tests are skipped on macOS at the test layer."
      shell: bash

    - name: Skip installation on Windows
      if: ${{ inputs.os == 'Windows' }}
      run: echo "Skipping Wine installation on Windows. Not necessary."
      shell: bash
