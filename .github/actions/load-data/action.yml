name: 'Prepare Datasets'
description: 'Restores data from caches or downloads it from S3.'
inputs:
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  s3-gin-bucket:
    description: 'S3 GIN Bucket URL'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install and configure AWS CLI
      shell: bash
      run: |
        pip install awscli
        aws configure set aws_access_key_id "${{ inputs.aws-access-key-id }}"
        aws configure set aws_secret_access_key "${{ inputs.aws-secret-access-key }}"

    - name: Compute ephys cache key from S3 listing
      id: ephys
      shell: bash
      run: |
        # Hash the listing of every object under the dataset prefix on S3.
        # Any file added, removed, or re-uploaded changes the listing and
        # therefore the cache key, so CI picks up data updates automatically
        # without contacting gin.
        LIST_HASH=$(aws s3 ls --recursive "${{ inputs.s3-gin-bucket }}/ephy_testing_data/" | sha256sum | cut -d' ' -f1)
        echo "DATASET_VERSION=$LIST_HASH" >> $GITHUB_OUTPUT

    - name: Cache ephys dataset
      uses: actions/cache@v5
      id: cache-ephys-datasets
      with:
        path: ./ephy_testing_data
        key: ephys-datasets-${{ steps.ephys.outputs.DATASET_VERSION }}
        enableCrossOsArchive: true

    - name: Compute ophys cache key from S3 listing
      id: ophys
      shell: bash
      run: |
        LIST_HASH=$(aws s3 ls --recursive "${{ inputs.s3-gin-bucket }}/ophys_testing_data/" | sha256sum | cut -d' ' -f1)
        echo "DATASET_VERSION=$LIST_HASH" >> $GITHUB_OUTPUT

    - name: Cache ophys dataset
      uses: actions/cache@v5
      id: cache-ophys-datasets
      with:
        path: ./ophys_testing_data
        key: ophys-datasets-${{ steps.ophys.outputs.DATASET_VERSION }}
        enableCrossOsArchive: true

    - name: Compute behavior cache key from S3 listing
      id: behavior
      shell: bash
      run: |
        LIST_HASH=$(aws s3 ls --recursive "${{ inputs.s3-gin-bucket }}/behavior_testing_data/" | sha256sum | cut -d' ' -f1)
        echo "DATASET_VERSION=$LIST_HASH" >> $GITHUB_OUTPUT

    - name: Cache behavior dataset
      uses: actions/cache@v5
      id: cache-behavior-datasets
      with:
        path: ./behavior_testing_data
        key: behavior-datasets-${{ steps.behavior.outputs.DATASET_VERSION }}
        enableCrossOsArchive: true

    - if: ${{ steps.cache-ephys-datasets.outputs.cache-hit != 'true' }}
      name: Download ephys dataset from S3
      shell: bash
      run: |
        aws s3 cp --recursive "${{ inputs.s3-gin-bucket }}/ephy_testing_data" ./ephy_testing_data

    - if: ${{ steps.cache-ophys-datasets.outputs.cache-hit != 'true' }}
      name: Download ophys dataset from S3
      shell: bash
      run: |
        aws s3 cp --recursive "${{ inputs.s3-gin-bucket }}/ophys_testing_data" ./ophys_testing_data

    - if: ${{ steps.cache-behavior-datasets.outputs.cache-hit != 'true' }}
      name: Download behavior dataset from S3
      shell: bash
      run: |
        aws s3 cp --recursive "${{ inputs.s3-gin-bucket }}/behavior_testing_data" ./behavior_testing_data
